<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acme School - Crear Examen</title>
    <link rel="stylesheet" href="/CSS/reporteEstadisticas.css
    ">
</head>

<body>

    <header>
        <section class="img-container">
            <img id="logo-img" src="/assets/LogoPlataforma.png" alt="Acme School">
            <div class="div-container">
                <h1>Acme School</h1>
                <p>Exams platform</p>
            </div>
        </section>

        <nav class="nav-container">
            <a id="nav-resolver" href="/HTML/resolverExamen.html">Resolver examen</a>
            <a id="nav-usuarios" href="/HTML/crearUsuario.html">Usuarios</a>
            <a id="nav-examenes" class="active" href="/HTML/crearExamen.html">Exámenes</a>
            <a id="nav-reporte" href="/HTML/reporteEstadisticas.html">Reporte</a>
        </nav>

        <div class="btnS-container">
            <a id="btn-salir" href="/HTML/login.html">Salir</a>
        </div>
    </header>

    <main>
        <section class="intro-examenes">
            <p class="etiqueta">ADMINISTRACIÓN</p>
            <h2>GESTIÓN DE EXÁMENES</h2>
            <p class="descripcion">Crea, administra y elimina los exámenes disponibles para los estudiantes</p>
        </section>

        <div class="page-container">

            <!-- FORMULARIO -->
            <div class="tarjeta">

                <h2>Crear examen</h2>

                <div class="fila">

                    <div class="grupo">
                        <label for="codigo">Código del examen </label>
                        <input type="text" id="codigo" placeholder="Ej: JS-101">
                    </div>

                    <div class="grupo">
                        <label for="titulo">Título del examen</label>
                        <input type="text" id="titulo" placeholder="Ej: Fundamentos de JavaScript">
                    </div>

                </div>

                <div class="fila">

                    <div class="grupo">
                        <label for="tiempo">Tiempo en minutos</label>
                        <input type="number" id="tiempo" placeholder="Ej: 10" min="1">
                    </div>

                    <div class="grupo">
                        <label for="aprobacion">Porcentaje de aprobación</label>
                        <input type="number" id="aprobacion" placeholder="Ej: 70" min="1" max="100">
                    </div>

                </div>

                <div class="grupo">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" placeholder="Describe brevemente el examen..."></textarea>
                </div>

                <div class="boton-pregunta">
                    <button id="agregarPregunta" class="btn-agregar-pregunta">
                        + Agregar pregunta
                    </button>
                </div>

                <div id="preguntas" class="preguntas"></div>

                <div class="botones">

                    <button id="crearExamen" class="btn-crear">
                        Crear examen
                    </button>

                    <button id="limpiar" class="btn-limpiar">
                        Limpiar
                    </button>

                </div>

            </div>

            <!-- TABLA -->
            <div class="tarjeta">

                <div class="encabezado">
                    <h2>Exámenes registrados</h2>
                    <span id="contador" class="contador">0 registros</span>
                </div>

                <div class="tabla">

                    <table>

                        <thead>
                            <tr>
                                <th>CÓDIGO</th>
                                <th>EXAMEN</th>
                                <th>TIEMPO</th>
                                <th>APROBACIÓN</th>
                                <th>PREGUNTAS</th>
                                <th>ACCIONES</th>
                            </tr>
                        </thead>

                        <tbody id="tablaExamenes"></tbody>

                    </table>

                </div>

            </div>

        </div>
    </main>

    <script src="/JavaScript/reporteEstadisticas.js"></script>

</body>

</html>
